    <circle cx="-15" cy="-10" r="10"/>
    <path d="M-15,2 L-15,25"/>
    <path d="M-25,12 L-5,12"/>
    <rect x="10" y="-18" width="24" height="32" rx="2"/>
    <line x1="16" y1="-8" x2="28" y2="-8" stroke-width="1.5"/>
    <line x1="16" y1="-1" x2="28" y2="-1" stroke-width="1.5"/>
